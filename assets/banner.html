<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
  html, body { margin: 0; padding: 0; }
  .banner {
    width: 1600px; height: 400px; background: #0B0C10;
    position: relative; overflow: hidden;
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .glow {
    position: absolute; inset: 0;
    background: radial-gradient(820px 460px at 20% 42%, rgba(91, 140, 255, 0.14), transparent 64%);
  }
  .grid {
    position: absolute; inset: 0; opacity: 0.5;
    background-image:
      linear-gradient(rgba(28, 31, 40, 0.7) 1px, transparent 1px),
      linear-gradient(90deg, rgba(28, 31, 40, 0.7) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(900px 400px at 78% 50%, #000 0%, transparent 75%);
            mask-image: radial-gradient(900px 400px at 78% 50%, #000 0%, transparent 75%);
  }
  .mark { position: absolute; left: 104px; top: 50%; transform: translateY(-50%); }
  .text { position: absolute; left: 322px; top: 50%; transform: translateY(-52%); }
  h1 { margin: 0; font-size: 112px; font-weight: 700; letter-spacing: -0.05em; color: #E7ECF3; line-height: 1; }
  p {
    margin: 24px 0 0 5px;
    font-size: 28px; font-weight: 500; line-height: 1; color: #5B8CFF;
  }
  .cursor {
    display: inline-block; width: 16px; height: 26px; margin-left: 8px;
    background: #5B8CFF; transform: translateY(4px); border-radius: 1px;
  }
  /* terminal / markdown lines on the right */
  .lines {
    position: absolute; right: 110px; top: 50%; transform: translateY(-50%);
    width: 420px; display: flex; flex-direction: column; gap: 22px;
  }
  .ln { display: flex; align-items: center; gap: 16px; }
  .gut { color: #3A4150; font-size: 19px; width: 26px; text-align: right; flex: none; }
  .tok { height: 13px; border-radius: 3px; }
</style>
</head>
<body>
<div class="banner">
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="mark">
    <svg width="176" height="176" viewBox="0 0 256 256">
      <path d="M92 70 L92 162 L168 116 Z" fill="#5B8CFF" stroke="#5B8CFF" stroke-width="18" stroke-linejoin="round"/>
      <rect x="92" y="186" width="76" height="14" rx="3" fill="#5B8CFF"/>
    </svg>
  </div>
  <div class="text">
    <h1>narrado</h1>
    <p>&#9654; press play on your markdown<span class="cursor"></span></p>
  </div>
  <div class="lines" id="lines"></div>
  <script>
    // markdown source lines, rendered as colored tokens — a quiet code listing
    const rows = [
      [[200, "#5B8CFF"]],
      [[120, "#E7ECF3"], [150, "#2A3142"]],
      [[90, "#3D6BE0"], [110, "#2A3142"], [60, "#2A3142"]],
      [[160, "#E7ECF3"], [70, "#2A3142"]],
      [[100, "#2A3142"], [130, "#3D6BE0"]],
      [[210, "#5B8CFF"]],
    ];
    const host = document.getElementById("lines");
    rows.forEach((toks, i) => {
      const row = document.createElement("div");
      row.className = "ln";
      const g = document.createElement("span");
      g.className = "gut";
      g.textContent = i + 1;
      row.append(g);
      toks.forEach(([w, c], j) => {
        const t = document.createElement("div");
        t.className = "tok";
        t.style.width = w + "px";
        t.style.background = c;
        t.style.opacity = (c === "#2A3142" ? 0.9 : (0.95 - i * 0.06)).toFixed(2);
        row.append(t);
      });
      host.append(row);
    });
  </script>
</div>
</body>
</html>
