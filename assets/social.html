<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .card {
    width: 1280px; height: 640px; background: #161616;
    position: relative; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .glow {
    position: absolute; inset: 0;
    background: radial-gradient(820px 520px at 50% 38%, rgba(86, 129, 181, 0.18), transparent 68%);
  }
  .lockup { display: flex; align-items: center; gap: 34px; z-index: 1; }
  h1 { margin: 0; font-size: 124px; font-weight: 700; letter-spacing: -0.035em; color: #edf1f6; }
  .tagline {
    margin: 26px 0 0; z-index: 1;
    font: 500 30px/1 ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    color: #7fb0dc;
  }
  .sub { margin: 22px 0 0; z-index: 1; font-size: 24px; font-weight: 500; color: #8b94a3; letter-spacing: 0.01em; }
  .sub b { color: #c3cdd9; font-weight: 600; }
  .wave {
    position: absolute; bottom: 0; left: 0; right: 0; height: 96px;
    display: flex; align-items: flex-end; justify-content: center; gap: 14px;
  }
  .bar { width: 10px; border-radius: 6px 6px 0 0; }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="lockup">
    <svg width="150" height="150" viewBox="0 0 256 256">
      <path d="M64 72 L64 184 L162 128 Z" fill="#5681b5" stroke="#5681b5" stroke-width="20" stroke-linejoin="round"/>
      <path d="M192 96 a44 44 0 0 1 0 64" stroke="#7fb0dc" stroke-width="16" stroke-linecap="round" fill="none"/>
      <path d="M218 74 a76 76 0 0 1 0 108" stroke="#7fb0dc" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.45"/>
    </svg>
    <h1>narrado</h1>
  </div>
  <p class="tagline">press play on your markdown.</p>
  <p class="sub">on-device text-to-speech for <b>VS Code</b> &amp; <b>Cursor</b> — no cloud, no API keys</p>
  <div class="wave" id="wave"></div>
  <script>
    const wave = document.getElementById("wave");
    for (let i = 0; i < 44; i++) {
      const b = document.createElement("div");
      b.className = "bar";
      const h = 14 + Math.abs(Math.sin(i * 0.55)) * 62;
      b.style.height = h.toFixed(0) + "px";
      b.style.background = i % 2 ? "#7fb0dc" : "#5681b5";
      const edge = Math.min(i, 43 - i);
      b.style.opacity = Math.min(0.55, 0.08 + edge * 0.045).toFixed(2);
      wave.append(b);
    }
  </script>
</div>
</body>
</html>
