<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
  html, body { margin: 0; padding: 0; }
  .card {
    width: 1280px; height: 640px; background: #0B0C10;
    position: relative; overflow: hidden;
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .glow {
    position: absolute; inset: 0;
    background: radial-gradient(760px 520px at 50% 36%, rgba(91, 140, 255, 0.16), transparent 66%);
  }
  .grid {
    position: absolute; inset: 0; opacity: 0.45;
    background-image:
      linear-gradient(rgba(28, 31, 40, 0.7) 1px, transparent 1px),
      linear-gradient(90deg, rgba(28, 31, 40, 0.7) 1px, transparent 1px);
    background-size: 52px 52px;
    -webkit-mask-image: radial-gradient(720px 460px at 50% 50%, #000 0%, transparent 78%);
            mask-image: radial-gradient(720px 460px at 50% 50%, #000 0%, transparent 78%);
  }
  .lockup { display: flex; align-items: center; gap: 32px; z-index: 1; }
  h1 { margin: 0; font-size: 128px; font-weight: 700; letter-spacing: -0.05em; color: #E7ECF3; line-height: 1; }
  .tagline {
    margin: 34px 0 0; z-index: 1;
    font-size: 31px; font-weight: 500; line-height: 1; color: #5B8CFF;
    display: flex; align-items: center;
  }
  .cursor {
    display: inline-block; width: 15px; height: 26px; margin-left: 10px;
    background: #5B8CFF; border-radius: 1px; transform: translateY(2px);
  }
  .sub { margin: 24px 0 0; z-index: 1; font-size: 23px; font-weight: 400; color: #7A8597; letter-spacing: 0; }
  .sub b { color: #E7ECF3; font-weight: 500; }
  .rule {
    position: absolute; bottom: 0; left: 0; right: 0; height: 56px;
    display: flex; align-items: center; justify-content: center; gap: 18px;
    color: #3A4150; font-size: 17px; letter-spacing: 0.04em;
    border-top: 1px solid #1C1F28;
  }
  .rule .dim { color: #3A4150; }
  .rule .on { color: #3D6BE0; }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="lockup">
    <svg width="148" height="148" viewBox="0 0 256 256">
      <path d="M92 70 L92 162 L168 116 Z" fill="#5B8CFF" stroke="#5B8CFF" stroke-width="18" stroke-linejoin="round"/>
      <rect x="92" y="186" width="76" height="14" rx="3" fill="#5B8CFF"/>
    </svg>
    <h1>narrado</h1>
  </div>
  <p class="tagline">&#9654; press play on your markdown<span class="cursor"></span></p>
  <p class="sub">on-device text-to-speech for <b>VS&nbsp;Code</b> &amp; <b>Cursor</b> &mdash; no cloud, no API keys</p>
  <div class="rule">
    <span class="dim">~/</span><span class="on">narrado</span><span class="dim">&nbsp;&rsaquo;&nbsp;kokoro-82m</span><span class="dim">&nbsp;&middot;&nbsp;offline</span><span class="dim">&nbsp;&middot;&nbsp;private</span>
  </div>
</div>
</body>
</html>
